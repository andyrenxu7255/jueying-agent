services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required for production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}

  redis:
    command: redis-server --appendonly yes --maxmemory 350mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required for production}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required for production}", "ping"]

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required for production}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required for production}

  clickhouse:
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required for production}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required for production}

  litellm:
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required for production}

  gateway-adapter:
    environment:
      NODE_ENV: production

  web-portal:
    environment:
      NODE_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required for production}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:?INTERNAL_AUTH_SECRET is required for production}

  workflow:
    environment:
      NODE_ENV: production

  executor-gateway:
    environment:
      NODE_ENV: production

  fact-retrieval:
    environment:
      NODE_ENV: production

  hermes-adapter:
    environment:
      NODE_ENV: production

  skill-library:
    environment:
      NODE_ENV: production

  resource-scheduler:
    environment:
      NODE_ENV: production

  mobile-app:
    environment:
      NODE_ENV: production
