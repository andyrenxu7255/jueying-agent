services:
  # PostgreSQL 16 + pgvector + Apache AGE
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: ah-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_harness
      POSTGRES_USER: ${POSTGRES_USER:-agent_harness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_harness} -d agent_harness"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-harness-backend
    deploy:
      resources:
        limits:
          cpus: '1.25'
          memory: 3G

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: ah-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 350mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-harness-backend
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 450M

  # MinIO (S3兼容对象存储)
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: ah-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - agent-harness-backend
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 450M

  # LiteLLM Proxy (LLM Gateway)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ah-litellm
    restart: unless-stopped
    command: --config /app/config.yaml
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      EMBEDDING_PROVIDER_API_KEY: ${EMBEDDING_PROVIDER_API_KEY}
      RERANK_PROVIDER_API_KEY: ${RERANK_PROVIDER_API_KEY}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',4000),5); s.sendall(b'GET /health/liveliness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n'); d=s.recv(128); s.close(); import sys; sys.exit(0 if b' 200 ' in d else 1)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - agent-harness-net
      - agent-harness-backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # SigNoz - OpenTelemetry Collector
  signoz-otel-collector:
    image: signoz/signoz-otel-collector:0.88.11
    container_name: ah-signoz-otel
    restart: unless-stopped
    command:
      - "--config=/etc/otel-collector-config.yaml"
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      OTEL_RESOURCE_ATTRIBUTES: "service.name=agent-harness"
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks:
      - agent-harness-net
      - agent-harness-backend
    depends_on:
      - clickhouse

  # SigNoz - ClickHouse (存储)
  clickhouse:
    image: clickhouse/clickhouse-server:24.1.5-alpine
    container_name: ah-clickhouse
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: signoz_metrics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse_changeme}
    ports:
      - "9002:9000"
      - "8123:8123"
    networks:
      - agent-harness-backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # SigNoz - 前端
  signoz-frontend:
    image: signoz/frontend:0.44.0
    container_name: ah-signoz-frontend
    restart: unless-stopped
    ports:
      - "3301:3301"
    environment:
      - SIGNOZ_API_URL=http://signoz-query-service:8080
    networks:
      - agent-harness-net
      - agent-harness-backend
    depends_on:
      - signoz-query-service

  # SigNoz - Query Service
  signoz-query-service:
    image: signoz/query-service:0.44.0
    container_name: ah-signoz-query
    command:
      - "-config=/root/config/prometheus.yml"
    environment:
      - ClickHouseUrl=tcp://clickhouse:9000?username=${CLICKHOUSE_USER:-clickhouse}&password=${CLICKHOUSE_PASSWORD:-clickhouse_changeme}
      - STORAGE=clickhouse
      - SIGNOZ_LOCAL_DB_PATH=/var/lib/signoz/signoz.db
    volumes:
      - signoz_data:/var/lib/signoz
    ports:
      - "8080:8080"
    networks:
      - agent-harness-net
      - agent-harness-backend
    depends_on:
      - clickhouse
    restart: unless-stopped

  # Gateway Adapter (开发模式 - 本地代码挂载)
  gateway-adapter:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./apps/gateway-adapter/Dockerfile
    container_name: ah-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
      SKIP_LLM_PLAN: ${SKIP_LLM_PLAN:-true}
      LITELLM_URL: http://litellm:4000
      LITELLM_MODEL: ${LITELLM_MODEL:-minimax-m2.7}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      WORKFLOW_URL: http://workflow-service:3000
      FACT_RETRIEVAL_URL: http://fact-retrieval:3000
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4318
      FEISHU_SIGNING_SECRET: ${FEISHU_SIGNING_SECRET:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_DOMAIN: ${FEISHU_DOMAIN:-feishu}
      HERMES_URL: http://hermes-adapter:3000
      RESOURCE_SCHEDULER_URL: http://resource-scheduler:3000
      MOBILE_APP_URL: http://mobile-app:3000
      WORKFLOW_PLAN_BUDGET_SEC: ${WORKFLOW_PLAN_BUDGET_SEC:-3600}
      WORKFLOW_POLL_MAX_ITERATIONS: ${WORKFLOW_POLL_MAX_ITERATIONS:-72}
      WECOM_TOKEN: ${WECOM_TOKEN:-}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_CORP_SECRET: ${WECOM_CORP_SECRET:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      WECOM_ENCODING_AES_KEY: ${WECOM_ENCODING_AES_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3003}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/gateway-adapter/src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 480M

  # Workflow Service
  workflow-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./services/workflow/Dockerfile
    container_name: ah-workflow
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
      LITELLM_URL: http://litellm:4000
      LITELLM_MODEL: ${LITELLM_MODEL:-minimax-m2.7}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      EXECUTOR_URL: http://executor-gateway:3000
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      SKIP_LLM_PLAN: ${SKIP_LLM_PLAN:-false}
      LITELLM_PLAN_TIMEOUT_MS: ${LITELLM_PLAN_TIMEOUT_MS:-60000}
      WORKFLOW_BUDGET_SECONDS: ${WORKFLOW_BUDGET_SECONDS:-3600}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4318
    ports:
      - "3001:3000"
    volumes:
      - ./services/workflow/src:/app/src:ro
      - ./services/workflow/.runtime:/app/.runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 700M

  fact-retrieval:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./services/fact-retrieval/Dockerfile
    container_name: ah-fact-retrieval
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_changeme}
      ENABLE_RERANK: ${ENABLE_RERANK:-true}
      ENABLE_GRAPH: ${ENABLE_GRAPH:-true}
      MINIO_BUCKET: ${MINIO_BUCKET:-agent-harness}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4318
      EMBEDDING_PROVIDER_API_KEY: ${EMBEDDING_PROVIDER_API_KEY}
      EMBEDDING_PROVIDER_URL: ${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      EMBEDDING_PROVIDER_MODEL: ${EMBEDDING_MODEL_ID:-netease-youdao/bce-embedding-base_v1}
      EMBEDDING_MODE: provider
      RERANK_PROVIDER_API_KEY: ${RERANK_PROVIDER_API_KEY}
      RERANK_PROVIDER_URL: ${RERANK_BASE_URL:-https://api.siliconflow.cn/v1}
      RERANK_PROVIDER_MODEL: ${RERANK_MODEL_ID:-BAAI/bge-reranker-v2-m3}
    ports:
      - "3004:3000"
    volumes:
      - ./services/fact-retrieval/src:/app/src:ro
      - ./services/fact-retrieval/.runtime:/app/.runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 700M

  # Executor Gateway
  executor-gateway:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./services/executor-gateway/Dockerfile
    container_name: ah-executor
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_changeme}
      FACT_RETRIEVAL_URL: http://fact-retrieval:3000
      WORKFLOW_URL: http://workflow-service:3000
      LITELLM_URL: http://litellm:4000
      LITELLM_MODEL: ${LITELLM_MODEL:-minimax-m2.7}
      LITELLM_CODE_MODEL: ${LITELLM_CODE_MODEL:-minimax-m2.7}
      LITELLM_EXEC_TIMEOUT_MS: ${LITELLM_EXEC_TIMEOUT_MS:-60000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4318
    ports:
      - "3002:3000"
    volumes:
      - ./services/executor-gateway/src:/app/src:ro
      - executor_worktrees:/var/lib/executor/worktrees
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      fact-retrieval:
        condition: service_started
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 1350M

  web-portal:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./apps/web-portal/Dockerfile
    container_name: ah-web-portal
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      GATEWAY_URL: http://gateway-adapter:3000
      WORKFLOW_URL: http://workflow-service:3000
      EXECUTOR_URL: http://executor-gateway:3000
      FACT_RETRIEVAL_URL: http://fact-retrieval:3000
      SKILL_LIBRARY_URL: http://skill-library:3000
      RESOURCE_SCHEDULER_URL: http://resource-scheduler:3000
      MOBILE_APP_URL: http://mobile-app:3000
      LITELLM_URL: http://litellm:4000
      SIGNOZ_QUERY_URL: http://signoz-query-service:8080
      SIGNOZ_PUBLIC_URL: http://localhost:3301
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ports:
      - "3003:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway-adapter:
        condition: service_started
      workflow-service:
        condition: service_started
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 300M

  feishu-longconn:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./services/feishu-longconn/Dockerfile
    container_name: ah-feishu-longconn
    environment:
      NODE_ENV: development
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_DOMAIN: ${FEISHU_DOMAIN:-feishu}
      GATEWAY_URL: http://gateway-adapter:3000
    depends_on:
      gateway-adapter:
        condition: service_started
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 200M
    restart: unless-stopped

  hermes-adapter:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./services/hermes-adapter/Dockerfile
    container_name: ah-hermes
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
      LITELLM_URL: http://litellm:4000
      LITELLM_MODEL: ${LITELLM_MODEL:-minimax-m2.7}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      FACT_RETRIEVAL_URL: http://fact-retrieval:3000
      MAX_MEMORY_PER_SESSION: ${MAX_MEMORY_PER_SESSION:-100}
      MEMORY_SUMMARY_THRESHOLD: ${MEMORY_SUMMARY_THRESHOLD:-50}
    ports:
      - "3005:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fact-retrieval:
        condition: service_started
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 400M
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ah-ollama
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agent-harness-net
      - agent-harness-backend
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Skill Library - 技能库管理微服务
  skill-library:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./services/skill-library/Dockerfile
    container_name: ah-skill-library
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
    ports:
      - "3007:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 350M
    restart: unless-stopped

  # Resource Scheduler - 资源配额与巡检服务
  resource-scheduler:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./services/resource-scheduler/Dockerfile
    container_name: ah-resource-scheduler
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
      WORKFLOW_URL: http://workflow-service:3000
      EXECUTOR_URL: http://executor-gateway:3000
      FACT_RETRIEVAL_URL: http://fact-retrieval:3000
      GATEWAY_URL: http://gateway-adapter:3000
      HERMES_URL: http://hermes-adapter:3000
      SKILL_LIBRARY_URL: http://skill-library:3000
      WEB_PORTAL_URL: http://web-portal:3000
      MOBILE_APP_URL: http://mobile-app:3000
    ports:
      - "3008:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-harness-net
      - agent-harness-backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health/live',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 350M
    restart: unless-stopped

  # Mobile App Backend - 移动设备推送服务
  mobile-app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: ./apps/mobile-app/Dockerfile
    container_name: ah-mobile-app
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_harness}:${POSTGRES_PASSWORD:-dev_password_changeme}@postgres:5432/agent_harness
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      PUSH_SERVICE_URL: ${PUSH_SERVICE_URL:-}
    ports:
      - "3009:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:3000/health/live',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agent-harness-net
      - agent-harness-backend
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 250M
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:0.12.13
    container_name: ah-ollama-pull
    profiles:
      - local-llm
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        ollama pull qwen3:8b 2>/dev/null || true
        echo "Ollama models pulled successfully"
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - agent-harness-net
      - agent-harness-backend
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
  signoz_data:
  executor_worktrees:
  ollama_data:

networks:
  agent-harness-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  agent-harness-backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.29.0.0/16
